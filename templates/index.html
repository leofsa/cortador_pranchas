<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortador de Pranchas</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background: radial-gradient(circle at top, #0b1324, #050814);
color:#fff;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.card{
width:min(820px,100%);
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.10);
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
padding:28px;
backdrop-filter:blur(8px);
}

.title{
font-size:34px;
color:#38bdf8;
font-weight:800;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

label{
font-size:13px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.14);
background:rgba(0,0,0,0.25);
color:#fff;
}

.full{
grid-column:1/-1;
}

.btn{
margin-top:18px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#38bdf8;
color:#001018;
font-weight:800;
font-size:16px;
cursor:pointer;
}

.loading{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h1 class="title">🗺️ Cortador de Pranchas</h1>

<form id="form" action="/processar" method="post" enctype="multipart/form-data">

<div class="grid">

<div class="full">
<label>Shapefile ZIP</label>
<input type="file" name="file" accept=".zip" required>
</div>

<div>
<label>UF</label>
<select name="uf" id="uf" required>
<option value="">Carregando...</option>
</select>
</div>

<div>
<label>Município</label>
<select name="municipio" id="municipio" required>
<option value="">Selecione a UF</option>
</select>
</div>

<div>
<label>Postes por prancha</label>
<input name="cap" type="number" value="200">
</div>

</div>

<button class="btn" id="btn" type="submit">
Gerar Excel + KMZ
</button>

<div class="loading" id="loading">
⏳ Processando...
</div>

</form>

</div>

<script>

const uf = document.getElementById("uf")
const municipio = document.getElementById("municipio")

async function carregarUFs(){

const res = await fetch("/ufs")
const data = await res.json()

uf.innerHTML = "<option value=''>Selecione</option>"

data.ufs.forEach(u => {

const opt = document.createElement("option")

opt.value = u
opt.text = u

uf.appendChild(opt)

})

}

uf.addEventListener("change", async () => {

municipio.innerHTML = "<option>Carregando...</option>"

const res = await fetch("/municipios/" + uf.value)
const data = await res.json()

municipio.innerHTML = ""

data.municipios.forEach(m => {

const opt = document.createElement("option")

opt.value = m
opt.text = m

municipio.appendChild(opt)

})

})

window.onload = carregarUFs

const form = document.getElementById("form")
const btn = document.getElementById("btn")
const loading = document.getElementById("loading")

form.addEventListener("submit", () => {

btn.disabled = true
loading.style.display = "block"

})

</script>

</body>
</html>
